<header class="hdr" role="banner">
  <div class="cont fx ac jb" style="height:74px">
    <a class="brand" routerLink="/" aria-label="Tecnogenco home">
      <img class="bmark" src="assets/tecnogenco-mark-dark.png" alt="" aria-hidden="true" width="38" height="38" />
      <span class="bword">Tecno<span class="dot">·</span>Genco</span>
    </a>

    <nav class="navwrap fx ac gap10" [class.open]="mobileOpen" role="navigation" aria-label="Navigazione principale">
      <a *ngFor="let n of nav"
         class="navlink"
         [routerLink]="n.path"
         routerLinkActive="on"
         [routerLinkActiveOptions]="{ exact: n.exact }"
         (click)="mobileOpen = false">{{ n.label }}</a>
    </nav>

    <div class="fx ac gap10">
      <app-secondary-button class="demo-btn" size="sm" ariaLabel="Richiedi Demo" (click)="goContact()">Richiedi Demo</app-secondary-button>
      <button class="iconbtn menu-btn" type="button" aria-label="Menu" [attr.aria-expanded]="mobileOpen" (click)="toggleMobile()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
      </button>
    </div>
  </div>
</header>
