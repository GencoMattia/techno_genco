<footer class="bt" style="padding:64px 0 40px;background:var(--bg2)">
  <div class="cont">
    <div class="footgrid">
      <div>
        <a class="brand" routerLink="/" style="margin-bottom:16px" aria-label="Tecnogenco home">
          <span class="bmark"></span>
          <span class="bword">Tecno<span class="dot">·</span>Genco</span>
        </a>
        <p class="tx2" style="font-size:14px;line-height:1.6;max-width:280px">Soluzioni avanzate per l'automazione e il controllo industriale. Industria 4.0, su misura.</p>
      </div>

      <div class="fcol">
        <div class="mono tx3" style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px">Navigazione</div>
        <a *ngFor="let n of nav" class="footlink tx2" [routerLink]="n.path">{{ n.label }}</a>
      </div>

      <div class="fcol">
        <div class="mono tx3" style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px">Contatti</div>
        <a class="footlink tx2" href="mailto:info&#64;tecnogenco.it" style="text-decoration:none">info&#64;tecnogenco.it</a>
        <a class="footlink tx2" href="tel:+391234567890" style="text-decoration:none">+39 123 456 7890</a>
      </div>

      <div class="fcol">
        <div class="mono tx3" style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px">Sede</div>
        <p class="tx2" style="font-size:14px;line-height:1.6;margin:0">Via dell'Industria 24<br>Italia</p>
      </div>
    </div>

    <div class="fx ac jb bt" style="margin-top:44px;padding-top:24px;flex-wrap:wrap;gap:12px">
      <span class="mono tx3" style="font-size:12px">© {{ currentYear }} TECNOGENCO · ALL RIGHTS RESERVED</span>
      <span class="mono tx3" style="font-size:12px">[ build · 2.0.0 ]</span>
    </div>
  </div>
</footer>
